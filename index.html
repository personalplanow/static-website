<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida - Examen Terraform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .info-box {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            border-left: 5px solid #667eea;
        }
        
        .info-item {
            margin: 15px 0;
            font-size: 1.1em;
        }
        
        .label {
            font-weight: 600;
            color: #495057;
            display: inline-block;
            width: 140px;
            text-align: right;
            margin-right: 15px;
        }
        
        .value {
            color: #764ba2;
            font-weight: 500;
        }
        
        .footer {
            margin-top: 30px;
            color: #6c757d;
            font-size: 0.9em;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.85em;
            margin: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Bienvenido al Examen Terraform</h1>
        
        <div class="info-box">
            <div class="info-item">
                <span class="label">Estudiante:</span>
                <span class="value">Jeisson Herrera</span>
            </div>
            <div class="info-item">
                <span class="label">Fecha:</span>
                <span class="value" id="current-date"></span>
            </div>
            <div class="info-item">
                <span class="label">Proyecto:</span>
                <span class="value">Betek - CloudNova S.A.S</span>
            </div>
            <div class="info-item">
                <span class="label">Tecnología:</span>
                <span class="value">AWS + Terraform</span>
            </div>
        </div>
        
        <div>
            <span class="badge">Infrastructure as Code</span>
            <span class="badge">AWS S3</span>
            <span class="badge">GitHub Actions</span>
            <span class="badge">Arquitectura Modular</span>
        </div>
        
        <div class="footer">
            <p>Desplegado automáticamente mediante Terraform</p>
            <p>Environment: dev | Managed by: Terraform</p>
        </div>
    </div>
    
    <script>
        const dateElement = document.getElementById('current-date');
        const now = new Date();
        const options = { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        dateElement.textContent = now.toLocaleDateString('es-ES', options);
    </script>
</body>
</html>
